databases:
  - name: trycore-evm-db
    plan: free
    databaseName: trycore_evm
    user: trycore

services:
  - type: web
    name: trycore-evm-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: trycore-evm-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
